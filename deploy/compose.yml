name: remail-app

services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=300
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  server:
    image: ${APP_IMAGE}
    environment:
      APP_ENV: "production"
      SERVER_ADDR: ":8080"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES}"
      MYSQL_DSN: "${MYSQL_DSN}"
      MYSQL_MAX_OPEN_CONNS: "${MYSQL_MAX_OPEN_CONNS:-200}"
      MYSQL_MAX_IDLE_CONNS: "${MYSQL_MAX_IDLE_CONNS:-50}"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: "${MINIO_BUCKET}"
      SESSION_SECRET: "${SESSION_SECRET}"
      SESSION_SECURE: "${SESSION_SECURE}"
      SMTP_ADDR: "${SMTP_ADDR}"
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_MODE: "${SMTP_MODE}"
      SMTP_DOMAIN: "${SMTP_DOMAIN}"
      SMTP_HELO_DOMAIN: "${SMTP_HELO_DOMAIN}"
      SMTP_DKIM_ENABLED: "${SMTP_DKIM_ENABLED}"
      SMTP_DKIM_DOMAIN: "${SMTP_DKIM_DOMAIN}"
      SMTP_DKIM_SELECTOR: "${SMTP_DKIM_SELECTOR}"
      SMTP_DKIM_ALGORITHM: "${SMTP_DKIM_ALGORITHM}"
      SMTP_DKIM_IDENTITY: "${SMTP_DKIM_IDENTITY:-}"
      SMTP_DKIM_PRIVATE_KEY_FILE: "${SMTP_DKIM_PRIVATE_KEY_FILE}"
      SMTP_INBOUND_ENABLED: "${SMTP_INBOUND_ENABLED}"
      SMTP_INBOUND_ADDR: "${SMTP_INBOUND_ADDR}"
      SMTP_INBOUND_DOMAIN: "${SMTP_INBOUND_DOMAIN}"
      SMTP_INBOUND_MAX_MESSAGE_BYTES: "${SMTP_INBOUND_MAX_MESSAGE_BYTES}"
      LOG_LEVEL: info
      LOG_FORMAT: json
      PPROF_ADDR: "${PPROF_ADDR}"
      SLOW_REQUEST_THRESHOLD: "${SLOW_REQUEST_THRESHOLD:-1s}"
      SLOW_SQL_THRESHOLD: "${SLOW_SQL_THRESHOLD:-200ms}"
      PPROF_CPU_THRESHOLD: "${PPROF_CPU_THRESHOLD:-80}"
      PPROF_CPU_PROFILE_DIR: "${PPROF_CPU_PROFILE_DIR:-pprof}"
      PPROF_CPU_PROFILE_DURATION: "${PPROF_CPU_PROFILE_DURATION:-10s}"
      PPROF_CPU_CHECK_INTERVAL: "${PPROF_CPU_CHECK_INTERVAL:-30s}"
    volumes:
      - /opt/remail/secrets/smtp-dkim-private-key.pem:/run/secrets/smtp-dkim-private-key.pem:ro
    ports:
      - "25:2525"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:6060:6060"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 12
    stop_grace_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
