services:
  mysql:
    image: mysql:8.0
    command:
      - --max-connections=550
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: remail
      MYSQL_USER: remail
      MYSQL_PASSWORD: remail
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "6gb", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: remail
      MINIO_ROOT_PASSWORD: remail_secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:6060:6060"
    environment:
      SERVER_ADDR: ":8080"
      MYSQL_DSN: "remail:remail@tcp(mysql:3306)/remail?charset=utf8mb4&parseTime=True&loc=Local"
      MYSQL_MAX_OPEN_CONNS: "500"
      MYSQL_MAX_IDLE_CONNS: "500"
      REDIS_ADDR: "redis:6379"
      REDIS_POOL_SIZE: "1024"
      BACKGROUND_LOAD_OVERLOAD_PERCENT: "${BACKGROUND_LOAD_OVERLOAD_PERCENT:-50}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "remail"
      MINIO_SECRET_KEY: "remail_secret"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: "remail"
      SESSION_SECRET: "dev-secret-do-not-use-in-production"
      MIGRATIONS_DIR: "/app/migrations"
      SMTP_ADDR: "${SMTP_ADDR:-}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_MODE: "${SMTP_MODE:-direct}"
      SMTP_DOMAIN: "${SMTP_DOMAIN:-aishop6.com}"
      SMTP_HELO_DOMAIN: "${SMTP_HELO_DOMAIN:-mx.aishop6.com}"
      SMTP_DKIM_ENABLED: "${SMTP_DKIM_ENABLED:-false}"
      SMTP_DKIM_DOMAIN: "${SMTP_DKIM_DOMAIN:-aishop6.com}"
      SMTP_DKIM_SELECTOR: "${SMTP_DKIM_SELECTOR:-mx}"
      SMTP_DKIM_ALGORITHM: "${SMTP_DKIM_ALGORITHM:-}"
      SMTP_DKIM_IDENTITY: "${SMTP_DKIM_IDENTITY:-}"
      SMTP_DKIM_PRIVATE_KEY: "${SMTP_DKIM_PRIVATE_KEY:-}"
      SMTP_DKIM_PRIVATE_KEY_FILE: "${SMTP_DKIM_PRIVATE_KEY_FILE:-}"
      SLOW_REQUEST_THRESHOLD: "1s"
      SLOW_SQL_THRESHOLD: "200ms"
      PPROF_ADDR: ":6060"
      PPROF_CPU_THRESHOLD: "80"
      PPROF_CPU_PROFILE_DIR: "pprof"
      PPROF_CPU_PROFILE_DURATION: "10s"
      PPROF_CPU_CHECK_INTERVAL: "30s"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  minio_data:
