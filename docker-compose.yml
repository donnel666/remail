services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: remail
      MYSQL_USER: remail
      MYSQL_PASSWORD: remail
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: remail
      MINIO_ROOT_PASSWORD: remail_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "127.0.0.1:6060:6060"
    environment:
      SERVER_ADDR: ":8080"
      MYSQL_DSN: "remail:remail@tcp(mysql:3306)/remail?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "remail"
      MINIO_SECRET_KEY: "remail_secret"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: "remail"
      SESSION_SECRET: "dev-secret-do-not-use-in-production"
      MIGRATIONS_DIR: "/app/migrations"
      SLOW_REQUEST_THRESHOLD: "1s"
      SLOW_SQL_THRESHOLD: "200ms"
      PPROF_ADDR: ":6060"
      PPROF_CPU_THRESHOLD: "80"
      PPROF_CPU_PROFILE_DIR: "pprof"
      PPROF_CPU_PROFILE_DURATION: "10s"
      PPROF_CPU_CHECK_INTERVAL: "30s"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  mysql_data:
  minio_data:
