      operationId: postResourceValidate
      summary: Queue asynchronous resource validation
      tags:
        - Resources
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: resourceId
          in: path
          required: true
          schema:
            type: integer
      description: >
        Marks the resource pending and returns immediately. The dispatcher
        assigns bounded Redis/Asynq work according to current system capacity;
        Microsoft OAuth/Graph checks and domain DNS checks never run in HTTP.
      responses:
        "202":
          description: Resource validation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceValidationsResponse"
        "400":
          description: Invalid resource id
          content:
            application/json:
              schema:
