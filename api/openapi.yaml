          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/admin/tasks/{taskId}:
    get:
      operationId: getAdminTask
      summary: Get one normalized administrator task
      description: Requires `governance:task/read`. The ID must be a source-qualified or equivalently globally unique safe reference. Polling reads the owning task fact only and does not grant cross-context write authority. A required source failure returns 503 rather than a stale or fabricated status.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 160
            pattern: '^[a-z][a-z0-9_]*:[A-Za-z0-9._~-]+$'
      responses:
        "200":
          description: Current normalized task state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTaskView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/admin/messages:
    get:
      operationId: getAdminMessages
      summary: List primary-mailbox message summaries for a resource
      description: Requires `mailmatch:message/read`. Search is evaluated server-side across the authorized sender, recipient, subject, preview/body, and verification-code semantics, but list items never contain a body, full match diagnostic, private object key, or raw upstream message. Verification codes and order numbers are returned only as authorized safe display fields.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: query
          description: Resource type; defaults to microsoft for backward compatibility.
          schema:
            type: string
            enum: [microsoft, domain]
            default: microsoft
        - name: resourceId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: beforeReceivedAt
          in: query
          description: Timestamp component of a stable continuation cursor. Must be supplied together with beforeId; offset must remain zero.
          schema:
            type: string
            format: date-time
        - name: beforeId
          in: query
          description: ID component of a stable continuation cursor. Must be supplied together with beforeReceivedAt.
          schema:
            type: integer
            minimum: 1
        - name: includeTotal
          in: query
          description: Compute and return the matching total. Set false on continuation requests to avoid repeating COUNT.
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated message summaries without bodies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMessageListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/admin/messages/{messageId}:
    get:
      operationId: getAdminMessage
      summary: Get one primary-mailbox message body and diagnostic
      description: Requires `mailmatch:message/read`. `resourceId` participates in the authorization and association lookup; an unknown message and a message belonging to another resource both return the same safe 404. This controlled read may return the body, verification code, order number, and sanitized match diagnostic, but never an object key, raw envelope, token, or upstream error body.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: resourceId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: type
          in: query
          description: Resource type; defaults to microsoft for backward compatibility.
          schema:
            type: string
            enum: [microsoft, domain]
            default: microsoft
      responses:
        "200":
          description: Authorized message body and safe diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMessageDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/admin/bindings:
    get:
      operationId: getAdminBindings
      summary: Get a resource's current auxiliary binding and message summaries
      description: Requires `mailtransport:binding/read`. Directly queries the current binding fact and returns its safe summary plus a server-paginated auxiliary-message summary list. A resource with no configured auxiliary mailbox is a successful empty state with `binding=null`; it is not represented as 404. Message bodies, raw envelopes, and private object keys are not returned.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: resourceId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: beforeReceivedAt
          in: query
          description: Timestamp component of a stable continuation cursor. Must be supplied together with beforeId; offset must remain zero.
          schema:
            type: string
            format: date-time
        - name: beforeId
          in: query
          description: ID component of a stable continuation cursor. Must be supplied together with beforeReceivedAt.
          schema:
            type: integer
            minimum: 1
        - name: includeTotal
          in: query
          description: Compute and return the matching total. Set false on continuation requests to avoid repeating COUNT.
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Current binding and paginated auxiliary-message summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBindingMessageListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/admin/bindings/messages/{messageId}:
    get:
      operationId: getAdminBindingMessage
      summary: Get one auxiliary-mailbox message body and diagnostic
      description: Requires `mailtransport:binding/read`. The server verifies the resource, current/historical binding scope, and message association together; unknown and cross-resource IDs return the same safe 404. The response may contain the authorized body, code, order number, and sanitized diagnostic, but never a raw RFC822 object key, original envelope, secret, or upstream error body.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: resourceId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Authorized auxiliary message body and safe diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuxiliaryMessageDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

