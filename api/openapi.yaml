          description: Administrator-safe Microsoft resource summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMicrosoftResourceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    patch:
      operationId: patchAdminMicrosoftResource
      summary: Atomically edit a Microsoft resource
      description: |
        Base fields require `core:resource/write`. Supplying `forSale` or `credentials` additionally requires `core:resource/operate`; supplying `bindingAddress` additionally requires `mailtransport:binding/write`. Session authentication, CSRF, and an idempotency key are required. Resource, owner, current binding input, optional complete credentials, pending state, and OperationLog are committed atomically. `status`, derived health, task state, and binding verification state are not accepted. Email or owner changes conflict with an active Allocation.
      tags:
        - Admin
      security:
        - cookieAuth: []
