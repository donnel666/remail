openapi: "3.0.3"
info:
  title: ReMail API
  description: |
    ReMail 邮箱交易平台 — 统一业务 API。
    控制台和 SDK 共用同一接口，由鉴权中间件决定调用者能力。
  version: "0.1.0"
  contact:
    name: ReMail Team

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  # --- System ---
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      tags:
        - System
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness probe
      tags:
        - System
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"
        "503":
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"

  # --- Activation ---
  /v1/activation:
    get:
      operationId: getActivation
      summary: Check if first activation is needed
      tags:
        - IAM
      responses:
        "200":
          description: Activation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationResponse"

    post:
      operationId: postActivation
      summary: Activate system and create first super_admin
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivationRequest"
      responses:
        "201":
          description: Super admin created
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "409":
          description: Activation already completed
          content:
            application/json:
                schema:
                  $ref: "#/components/schemas/Error"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Human verification ---
  /v1/turnstile/config:
    get:
      operationId: getTurnstileConfig
      summary: Get the public Cloudflare Turnstile site key
      tags:
        - IAM
      responses:
        "200":
          description: Turnstile widget configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurnstileConfigResponse"
        "503":
          description: Human verification is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/email/code:
    post:
      operationId: postEmailCode
      summary: Send an email verification code
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailCodeRequest"
      responses:
        "204":
          description: Verification code request accepted
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Human verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Verification code resend cooldown active
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Human verification or mail service is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Registration ---
  /v1/users:
    post:
      operationId: postRegister
      summary: Register a new user
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "422":
          description: Verification code incorrect or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Registration verification attempt rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Login / Sessions ---
  /v1/login:
    post:
      operationId: postLogin
      summary: Login and create a session
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful, HttpOnly cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
                description: sid HttpOnly cookie and csrf_token SameSite cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Human verification failed, or account or password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Login rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Human verification is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions/current:
    delete:
      operationId: deleteSession
      summary: Logout and delete current session
      tags:
        - IAM
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  # --- Current User ---
  /v1/me:
    get:
      operationId: getMe
      summary: Get current authenticated user profile
      tags:
        - IAM
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/me/invite:
    get:
      operationId: getMeInvite
      summary: Get current user's referral invite code
      tags:
        - IAM
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current referral invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentInviteResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Referral invite not created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postMeInvite
      summary: Create or get current user's referral invite code
      tags:
        - IAM
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Current referral invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentInviteResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/suppliers/applications:
    post:
      operationId: postSupplierApplication
      summary: Submit current user's supplier application
      tags:
        - IAM
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierApplicationRequest"
      responses:
        "201":
          description: Supplier application submitted
          content:
            application/json:
              schema:
                type: object
                required:
                  - application
                properties:
                  application:
                    $ref: "#/components/schemas/SupplierApplicationResponse"
                additionalProperties: false
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Supplier application is already under review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid supplier application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/suppliers/applications/current:
    get:
      operationId: getCurrentSupplierApplication
      summary: Get current user's latest supplier application
      tags:
        - IAM
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current supplier application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierApplicationCurrentResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Password Change ---
  /v1/password:
    patch:
      operationId: patchPassword
      summary: Change current user's password
      description: Supplementary P1-I1 change-password endpoint.
      tags:
        - IAM
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed, all other sessions invalidated
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Account or password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/password/reset/request:
    post:
      operationId: postPasswordResetRequest
      summary: Request a password reset verification code
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetCodeRequest"
      responses:
        "204":
          description: Password reset request accepted
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Human verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Password reset code resend cooldown active
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Human verification or mail service is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/password/reset:
    post:
      operationId: postPasswordReset
      summary: Reset password with email verification code
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "204":
          description: Password reset successfully
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Verification code is incorrect or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Password reset rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Admin: Users ---
  /v1/admin/users:
    get:
      operationId: getAdminUsers
      summary: List all users (admin only)
      description: Requires `iam:user/read`. The Microsoft resource owner picker uses the existing paginated IAM query and must not infer owner eligibility client-side; mutation commands revalidate that the selected user exists and is enabled.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: ids
          in: query
          description: Optional comma-separated or repeated user IDs for exact batch lookup.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
              minimum: 1
        - name: search
          in: query
          description: Unified fuzzy search across user email, nickname, and ID.
          schema:
            type: string
            maxLength: 120
        - name: role
          in: query
          schema:
            type: string
            enum: [user, supplier, admin, super_admin]
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: userGroupId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    post:
      operationId: postAdminUser
      summary: Create a user (admin only)
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid user request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/enable:
    post:
      operationId: postAdminUsersEnable
      summary: Enable selected users
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserBulkCommand"
      responses:
        "200":
          description: User bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserBulkResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid user request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/disable:
    post:
      operationId: postAdminUsersDisable
      summary: Disable selected users
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserBulkCommand"
      responses:
        "200":
          description: User bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserBulkResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid user request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/delete:
    post:
      operationId: postAdminUsersDelete
      summary: Logically delete selected users
      description: Marks matching non-super-admin users as `deleted`, invalidates their authentication state, and preserves cross-context historical records. Deleted users are omitted from normal IAM lists.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserBulkCommand"
      responses:
        "200":
          description: User bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserBulkResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid user request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/sessions/revoke:
    post:
      operationId: postAdminUsersRevokeSessions
      summary: Revoke sessions for selected users
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserBulkCommand"
      responses:
        "200":
          description: User bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserBulkResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid user request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/{userId}:
    patch:
      operationId: patchAdminUser
      summary: Update a user (enable/disable, change role)
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "400":
          description: Invalid request body or user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid role level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAdminUser
      summary: Logically delete a user (admin only)
      description: Marks the non-super-admin user as `deleted`, invalidates authentication, and preserves related historical records.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User logically deleted
        "400":
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/{userId}/sessions/revoke:
    post:
      operationId: postAdminRevokeSessions
      summary: Force logout a user (revoke all sessions)
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: All sessions revoked
        "400":
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/{userId}/invitations:
