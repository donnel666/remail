    get:
      operationId: getAdminMicrosoftResource
      summary: Get a Microsoft resource administrator summary
      description: |
        Requires `core:resource/read`. Returns the basic-information Tab result: resource and owner identity, current auxiliary address, safe state and timestamps, alias counts, recent task summaries, configured credential flags, and token diagnostics. These fields are composed from bounded direct queries; no administrator projection table is maintained. Aliases, task history, allocations, message lists, and message bodies are loaded through their owning APIs and are not embedded here.
      tags:
