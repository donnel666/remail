components:
  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: CSRF token from the csrf_token SameSite cookie; required for authenticated state-changing requests.

    OptionalCsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
      description: CSRF token from the csrf_token SameSite cookie; required for Session state-changing requests and ignored for API Key requests.

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Required for money-write APIs. Reusing the same key with a different request fingerprint returns 409.

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
      description: HttpOnly session cookie set after login

    bearerAuth:
      type: http
      scheme: bearer
      description: User API key in the Authorization header, for example `Bearer rk-...`; SDK clients may also use `X-API-Key`.

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"
      additionalProperties: false

    ReadyzResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          example: "ok"
        dependencies:
          type: object
          additionalProperties:
            type: string
            example: "healthy"
      additionalProperties: false

    Error:
      type: object
      required:
        - message
        - requestId
      properties:
        message:
          type: string
          description: Safe business error message for the user
          example: "Account or password is incorrect."
        requestId:
          type: string
          description: Correlation ID for troubleshooting
          example: "req_a1b2c3d4"
        fields:
          type: object
