openapi: "3.0.3"
info:
  title: ReMail API
  description: |
    ReMail 邮箱交易平台 — 统一业务 API。
    控制台和 SDK 共用同一接口，由鉴权中间件决定调用者能力。
  version: "0.1.0"
  contact:
    name: ReMail Team

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  # --- System ---
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      tags:
        - System
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness probe
      tags:
        - System
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"
        "503":
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"

  # --- Activation ---
  /v1/activation:
    get:
      operationId: getActivation
      summary: Check if first activation is needed
      tags:
        - IAM
      responses:
        "200":
          description: Activation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationResponse"

    post:
      operationId: postActivation
      summary: Activate system and create first super_admin
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivationRequest"
      responses:
        "201":
          description: Super admin created
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "409":
          description: Activation already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Captcha ---
  /v1/captchas:
    post:
      operationId: postCaptcha
      summary: Create a captcha challenge
      tags:
        - IAM
      responses:
        "200":
          description: Captcha created (answer is never in the response)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptchaResponse"

  /v1/email/code:
    post:
      operationId: postEmailCode
      summary: Send an email verification code
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailCodeRequest"
      responses:
        "204":
          description: Verification code request accepted
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Captcha incorrect or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Mail service is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Registration ---
  /v1/users:
    post:
      operationId: postRegister
      summary: Register a new user
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Verification code incorrect or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Sessions (Login/Logout) ---
  /v1/sessions:
    post:
      operationId: postLogin
      summary: Login and create a session
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful, HttpOnly cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
                description: sid HttpOnly cookie and csrf_token SameSite cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Account or password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions/current:
    delete:
      operationId: deleteSession
      summary: Logout and delete current session
      tags:
        - IAM
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Current User ---
  /v1/me:
    get:
      operationId: getMe
      summary: Get current authenticated user profile
      tags:
        - IAM
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Password Change ---
  /v1/password:
    patch:
      operationId: patchPassword
      summary: Change current user's password
      description: Supplementary P1-I1 change-password endpoint.
      tags:
        - IAM
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed, all other sessions invalidated
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Account or password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/password/reset/request:
    post:
      operationId: postPasswordResetRequest
      summary: Request a password reset verification code
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetCodeRequest"
      responses:
        "204":
          description: Password reset request accepted
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Captcha incorrect or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Mail service is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/password/reset:
    post:
      operationId: postPasswordReset
      summary: Reset password with email verification code
      tags:
        - IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "204":
          description: Password reset successfully
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Verification code is incorrect or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Admin: Users ---
  /v1/admin/users:
    get:
      operationId: getAdminUsers
      summary: List all users (admin only)
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/{userId}:
    patch:
      operationId: patchAdminUser
      summary: Update a user (enable/disable, change role)
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserResponse"
                additionalProperties: false
        "400":
          description: Invalid request body or user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid role level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/{userId}/sessions/revoke:
    post:
      operationId: postAdminRevokeSessions
      summary: Force logout a user (revoke all sessions)
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: All sessions revoked
        "400":
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/permissions:
    get:
      operationId: getAdminPermissions
      summary: List IAM permission catalog
      tags:
        - Admin
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Permission catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionCatalogResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/users/{userId}/permissions:
    get:
      operationId: getAdminUserPermissions
      summary: Get a user's permission overrides
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User permission overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissionPoliciesResponse"
        "400":
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putAdminUserPermissions
      summary: Replace a user's permission overrides
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserPermissionsRequest"
      responses:
        "204":
          description: User permission overrides saved
        "400":
          description: Invalid request body or user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid permission policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/invites:
    get:
      operationId: getAdminInvites
      summary: List invites
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postAdminInvite
      summary: Create invite
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateInviteRequest"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                required:
                  - invite
                properties:
                  invite:
                    $ref: "#/components/schemas/InviteResponse"
                additionalProperties: false
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invite already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invite is invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/invites/{code}:
    patch:
      operationId: patchAdminInvite
      summary: Update invite
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateInviteRequest"
      responses:
        "200":
          description: Invite updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - invite
                properties:
                  invite:
                    $ref: "#/components/schemas/InviteResponse"
                additionalProperties: false
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invite is invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: CSRF token from the csrf_token SameSite cookie; required for authenticated state-changing requests.

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
      description: HttpOnly session cookie set after login

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"
      additionalProperties: false

    ReadyzResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          example: "ok"
        dependencies:
          type: object
          additionalProperties:
            type: string
            example: "healthy"
      additionalProperties: false

    Error:
      type: object
      required:
        - message
        - requestId
      properties:
        message:
          type: string
          description: Safe business error message for the user
          example: "Account or password is incorrect."
        requestId:
          type: string
          description: Correlation ID for troubleshooting
          example: "req_a1b2c3d4"
        fields:
          type: object
          description: Field-level validation errors (optional)
          additionalProperties:
            type: string
            example: "Email format is invalid."
      additionalProperties: false

    # --- IAM Schemas ---
    ActivationResponse:
      type: object
      required:
        - needed
      properties:
        needed:
          type: boolean
          description: Whether the system requires first-time activation
      additionalProperties: false

    ActivationRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        nickname:
          type: string
          maxLength: 100
      additionalProperties: false

    CaptchaResponse:
      type: object
      required:
        - captchaId
        - image
      properties:
        captchaId:
          type: string
          description: Captcha identifier (must be submitted with answer)
        image:
          type: string
          description: Base64-encoded PNG data URI of the captcha image
      additionalProperties: false

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - code
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        nickname:
          type: string
          maxLength: 100
        code:
          type: string
        inviteCode:
          type: string
          maxLength: 64
      additionalProperties: false

    EmailCodeRequest:
      type: object
      required:
        - email
        - captchaId
        - captchaAnswer
      properties:
        email:
          type: string
          format: email
        captchaId:
          type: string
        captchaAnswer:
          type: string
      additionalProperties: false

    LoginRequest:
      type: object
      required:
        - email
        - password
        - captchaId
        - captchaAnswer
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        captchaId:
          type: string
        captchaAnswer:
          type: string
      additionalProperties: false

    LoginResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
      additionalProperties: false

    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
      additionalProperties: false

    PasswordResetCodeRequest:
      type: object
      required:
        - email
        - captchaId
        - captchaAnswer
      properties:
        email:
          type: string
          format: email
        captchaId:
          type: string
        captchaAnswer:
          type: string
      additionalProperties: false

    PasswordResetRequest:
      type: object
      required:
        - email
        - code
        - newPassword
      properties:
        email:
          type: string
          format: email
        code:
          type: string
        newPassword:
          type: string
          minLength: 6
      additionalProperties: false

    UserResponse:
      type: object
      required:
        - id
        - email
        - nickname
        - role
        - roleLevel
        - enabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        email:
          type: string
        nickname:
          type: string
        role:
          type: string
          enum:
            - user
            - supplier
            - admin
            - super_admin
        roleLevel:
          type: integer
          description: |
            Numeric role level: 10=user, 20=supplier, 80=admin, 100=super_admin
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false

    AdminUpdateUserRequest:
      type: object
      properties:
        enabled:
          type: boolean
        roleLevel:
          type: integer
          minimum: 10
          maximum: 100
      additionalProperties: false

    PermissionCatalogResponse:
      type: object
      required:
        - permissions
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionCatalogItemResponse"
      additionalProperties: false

    PermissionCatalogItemResponse:
      type: object
      required:
        - resource
        - actions
      properties:
        resource:
          type: string
        actions:
          type: array
          items:
            type: string
      additionalProperties: false

    PermissionPolicyRequest:
      type: object
      required:
        - resource
        - action
        - effect
      properties:
        resource:
          type: string
        action:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
      additionalProperties: false

    AdminUpdateUserPermissionsRequest:
      type: object
      required:
        - policies
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PermissionPolicyRequest"
      additionalProperties: false

    UserPermissionPoliciesResponse:
