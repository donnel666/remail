  # --- Resources (P1-I2) ---
  /v1/resources:
    get:
      operationId: getResources
      summary: List email resources
      tags:
        - Resources
      security:
        - cookieAuth: []
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            default: owned
        - name: type
          in: query
          schema:
            type: string
            enum: [all, microsoft, domain]
            default: all
        - name: search
          in: query
          schema:
            type: string
          description: Unified fuzzy search. Microsoft matches email and suffix; domain matches domain and TLD.
        - name: suffix
          in: query
          schema:
            type: string
          description: Exact Microsoft suffix such as @outlook.com.
        - name: tld
          in: query
          schema:
            type: string
          description: Exact domain suffix such as .com.
        - name: status
          in: query
          schema:
            type: string
        - name: purpose
          in: query
          schema:
            type: string
            enum: [not_sale, sale, binding]
          description: Domain resource purpose filter.
        - name: forSale
          in: query
          schema:
            type: boolean
          description: Microsoft public supply filter. false is private; true is public sale.
        - name: longLived
          in: query
          schema:
            type: boolean
          description: Microsoft long-lived filter.
        - name: graphAvailable
          in: query
          schema:
            type: boolean
          description: Microsoft Graph availability filter.
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive resource creation lower bound.
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
