  # --- Resources (P1-I2) ---
  /v1/resources:
    get:
      operationId: getResources
      summary: List email resources
      tags:
        - Resources
      security:
        - cookieAuth: []
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            default: owned
        - name: type
          in: query
          schema:
            type: string
            enum: [all, microsoft, domain]
            default: all
        - name: search
          in: query
          schema:
            type: string
          description: Unified fuzzy search. Microsoft matches email and suffix; domain matches domain and TLD.
        - name: suffix
          in: query
          schema:
            type: string
          description: Exact Microsoft suffix such as @outlook.com.
        - name: tld
          in: query
          schema:
            type: string
          description: Exact domain suffix such as .com.
        - name: status
          in: query
          schema:
            type: string
        - name: purpose
          in: query
          schema:
            type: string
            enum: [not_sale, sale, binding]
          description: Domain resource purpose filter.
        - name: forSale
          in: query
          schema:
            type: boolean
          description: Microsoft public supply filter. false is private; true is public sale.
        - name: longLived
          in: query
          schema:
            type: boolean
          description: Microsoft long-lived filter.
        - name: graphAvailable
          in: query
          schema:
            type: boolean
          description: Microsoft Graph availability filter.
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive resource creation lower bound.
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive resource creation upper bound.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: afterId
          in: query
          schema:
            type: integer
            minimum: 1
          description: Seek cursor. When present, the server ignores offset and returns resources with id lower than this value.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
            maximum: 10000
      responses:
        "200":
          description: Resource list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceListResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
