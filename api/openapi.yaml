      type: object
      oneOf:
        - required:
            - proxyIds
          properties:
            all:
              type: boolean
              enum: [false]
            proxyIds:
              type: array
              minItems: 1
              items:
                type: integer
                minimum: 1
        - required:
            - all
            - filter
          properties:
            all:
              type: boolean
              enum: [true]
            filter:
              $ref: "#/components/schemas/ProxyBulkFilter"
          not:
            required:
              - proxyIds
      properties:
        all:
          type: boolean
          description: Check every proxy matching filter. When false or omitted, proxyIds mode is used.
        filter:
          $ref: "#/components/schemas/ProxyBulkFilter"
        proxyIds:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
      additionalProperties: false

    CheckProxiesResponse:
      type: object
      required:
        - requested
        - queued
        - checked
        - failed
        - items
      properties:
        requested:
          type: integer
        queued:
          type: integer
          description: Number of proxy checks accepted as durable check jobs. Filter mode creates one durable batch scheduler job while this value still reports the matched proxy count.
        checked:
          type: integer
          description: Reserved for completed synchronous checks. Always 0 for asynchronous check submission.
        failed:
          type: integer
          description: Reserved for completed synchronous checks. Always 0 for asynchronous check submission.
        items:
          type: array
          description: Queued proxy snapshots. Empty for fully asynchronous batch submissions.
          items:
            $ref: "#/components/schemas/ProxyItem"
      additionalProperties: false

