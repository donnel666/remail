components:
  parameters:
    TicketNoPath:
      name: ticketNo
      in: path
      required: true
      schema:
        type: string
    TicketTypeQuery:
      name: ticketType
      in: query
      schema:
        type: string
        enum: [order, general]
    TicketStatusQuery:
      name: status
      in: query
      schema:
        type: string
        enum: [open, processing, closed]
    TicketSearchQuery:
      name: search
      in: query
      schema:
        type: string
        maxLength: 120
    CreatedFromQuery:
      name: createdFrom
      in: query
      schema:
        type: string
        format: date-time
    CreatedToQuery:
      name: createdTo
      in: query
      schema:
        type: string
        format: date-time
    OffsetQuery:
      name: offset
      in: query
      description: Row offset used when afterId is absent.
      schema:
        type: integer
        default: 0
    AfterIdQuery:
      name: afterId
      in: query
      description: Last ticket id from the previous page.
      schema:
        type: integer
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: CSRF token from the csrf_token SameSite cookie; required for authenticated state-changing requests.

    OptionalCsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
      description: CSRF token from the csrf_token SameSite cookie; required for Session state-changing requests and ignored for API Key requests.

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Required for money-write APIs. Reusing the same key with a different request fingerprint returns 409.

    AdminCommandIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Required for administrator commands that create durable facts. Reusing the key with a different normalized request returns 409.
    AdminStateCommandIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Required retry identity for target-state administrator commands. Repeating an already-applied target state is a no-op.
    AdminDomainId:
      name: domainId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ExpectedAdminResourceVersion:
      name: version
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
      description: Exact integer resource version from the latest administrator resource result. A stale value returns 409 without a partial write.

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
      description: HttpOnly session cookie set after login

    bearerAuth:
      type: http
      scheme: bearer
      description: User API key in the Authorization header, for example `Bearer rk-...`; SDK clients may also use `X-API-Key`.

  responses:
    BadRequest:
      description: Malformed JSON, path, query, pagination, enum, or multipart input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The requested fact does not exist in the authorized scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: State, uniqueness, idempotency, active-allocation, or optimistic-concurrency conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: The request is syntactically valid but violates field or domain constraints
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadGateway:
      description: An authorized upstream content read failed safely
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: A required internal or upstream dependency is temporarily unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"
      additionalProperties: false

    ReadyzResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          example: "ok"
        dependencies:
          type: object
          additionalProperties:
            type: string
            example: "healthy"
      additionalProperties: false

    Error:
      type: object
      required:
        - message
        - requestId
      properties:
        message:
          type: string
          description: Safe business error message for the user
          example: "Account or password is incorrect."
        requestId:
          type: string
          description: Correlation ID for troubleshooting
          example: "req_a1b2c3d4"
        fields:
          type: object
          description: Field-level validation errors (optional)
          additionalProperties:
            type: string
            example: "Email format is invalid."
      additionalProperties: false

    APIKeyCreateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        expireAt:
          type: string
          format: date-time
          nullable: true
        rateLimitPerMinute:
          type: integer
          minimum: 1
          maximum: 10000
          nullable: true
          description: Empty means unlimited requests per minute.
        concurrencyLimit:
          type: integer
          nullable: true
          minimum: 1
          maximum: 500
          description: Empty uses the system default of 500 concurrent requests.
        quotaLimit:
          type: integer
          format: int64
          minimum: 1
          nullable: true
          description: Empty means unlimited total requests.
      additionalProperties: false

    APIKeyPatchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        enabled:
          type: boolean
        expireAt:
          type: string
          format: date-time
          nullable: true
        rateLimitPerMinute:
          type: integer
          minimum: 1
          maximum: 10000
          nullable: true
        concurrencyLimit:
          type: integer
          nullable: true
          minimum: 1
          maximum: 500
        quotaLimit:
          type: integer
          format: int64
          minimum: 1
          nullable: true
      additionalProperties: false

    APIKeyResponse:
      type: object
      required:
        - id
        - name
        - keyPrefix
        - enabled
        - rateLimitPerMinute
        - concurrencyLimit
        - quotaUsed
        - activeRequests
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        keyPrefix:
          type: string
        keyPlain:
          type: string
          description: Plain API key returned to its owner on create, list, and detail views.
        enabled:
          type: boolean
        rateLimitPerMinute:
          type: integer
          nullable: true
        concurrencyLimit:
          type: integer
          nullable: true
        quotaLimit:
          type: integer
          format: int64
          nullable: true
