  /v1/admin/resources:
    get:
      operationId: getAdminMicrosoftResources
      summary: List Microsoft resources for the administrator console
      description: |
        Requires `core:resource/read`. Directly queries the resource facts and returns administrator-safe Microsoft resource fields plus cross-filter facets. The default query excludes logically deleted resources; `status=deleted` selects deleted resources explicitly. Facets are calculated from the complete matched set and each facet ignores only its own filter. Credential values, tokens, object keys, task leases, and upstream payloads are never returned.
      tags:
        - Admin
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: query
          required: true
          description: This administrator query is limited to Microsoft resources.
          schema:
            type: string
            enum: [microsoft]
        - name: search
          in: query
          description: Case-insensitive search across resource ID, mailbox address, and owner display identity.
          schema:
            type: string
            maxLength: 120
        - name: suffix
          in: query
          description: Exact normalized mailbox domain. Values with or without a leading `@` are accepted.
          schema:
            type: string
            maxLength: 255
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AdminMicrosoftResourceStatus"
        - name: forSale
          in: query
          description: Public-supply flag. The UI's private=true filter maps to forSale=false.
          schema:
            type: boolean
        - name: longLived
          in: query
          schema:
            type: boolean
        - name: graphAvailable
          in: query
          schema:
            type: boolean
        - name: tokenHealth
          in: query
          schema:
            $ref: "#/components/schemas/AdminMicrosoftTokenHealth"
        - name: createdFrom
          in: query
          description: Inclusive ISO 8601 creation-time lower bound.
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          description: Exclusive ISO 8601 creation-time upper bound; must be later than createdFrom.
          schema:
            type: string
            format: date-time
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: afterId
          in: query
          description: Optional seek cursor for the same stable `id DESC` ordering. When present, offset is ignored.
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated Microsoft resource list and server-side facets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMicrosoftResourceListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/admin/resources/imports:
    post:
      operationId: postAdminMicrosoftResourceImport
      summary: Import Microsoft resources for a selected owner
      description: |
        Requires `core:resource/write`, Session authentication, CSRF, and an idempotency key. The request only persists a private upload and a durable import fact before returning 202. Parsing, duplicate handling, resource creation/recovery, and validation run asynchronously. The original TXT, credentials, and private object key are never returned or written to ordinary logs.
