        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Insufficient balance, insufficient inventory, or unavailable project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getOrders
      summary: List orders
      tags:
        - Trade
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [mine, all]
            default: mine
        - name: status
          in: query
          schema:
            type: string
            enum: [pending_payment, paid, active, completed, refunded, failed, closed]
        - name: serviceMode
          in: query
          schema:
            type: string
            enum: [purchase, code]
        - name: search
          in: query
          schema:
            type: string
          description: Prefix search by order number or delivery email; token-prefix search by user email/nickname or project name/platform; exact user/project ID search.
        - name: domain
          in: query
          description: Delivery email domain filter; the "@" prefix is optional.
          schema:
            type: string
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
        - name: offset
          in: query
          description: Row offset used when afterId is absent.
          schema:
            type: integer
            default: 0
        - name: afterId
          in: query
          schema:
            type: integer
            description: Last order id from the previous page.
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
