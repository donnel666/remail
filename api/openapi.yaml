      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - ownerId
                - longLived
                - errorStrategy
              properties:
                file:
                  type: string
                  format: binary
                  description: UTF-8 TXT using one of the four documented `----`-delimited credential line formats.
                ownerId:
                  type: integer
                  minimum: 1
                longLived:
                  type: boolean
                errorStrategy:
                  type: string
                  enum: [skip, abort]
              additionalProperties: false
      responses:
        "202":
          description: Durable import accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMicrosoftImportResponse"
        "400":
