        - Proxy Pool
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProxyRequest"
      responses:
        "201":
          description: Resource proxy created with checking status and a durable asynchronous check job accepted. Asynq dispatch failures leave the check job pending for dispatcher recovery and are logged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyItem"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Proxy already exists in the same pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid proxy URL or expireAt when provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/proxies/system:
    post:
      operationId: postAdminSystemProxy
      summary: Create a system fallback proxy
      tags:
        - Proxy Pool
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProxyRequest"
      responses:
        "201":
          description: System proxy created with checking status and a durable asynchronous check job accepted. Asynq dispatch failures leave the check job pending for dispatcher recovery and are logged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyItem"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Proxy already exists in the same pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid proxy URL or expireAt when provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/proxies/{proxyId}:
    patch:
      operationId: patchAdminProxy
      summary: Update proxy status or expiration
      tags:
        - Proxy Pool
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: proxyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProxyRequest"
      responses:
        "200":
          description: Proxy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyItem"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proxy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Proxy already exists in the same pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid status or expireAt when provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/proxies/{proxyId}/check:
    post:
      operationId: postAdminProxyCheck
      summary: Check a proxy and update detected metadata
      tags:
        - Proxy Pool
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: proxyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Proxy moved to checking status and a durable asynchronous check job accepted. Asynq dispatch failures leave the check job pending for dispatcher recovery and are logged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyItem"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proxy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Proxy status does not allow checking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: CSRF token from the csrf_token SameSite cookie; required for authenticated state-changing requests.

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
      description: HttpOnly session cookie set after login

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"
      additionalProperties: false

    ReadyzResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          example: "ok"
        dependencies:
          type: object
          additionalProperties:
            type: string
            example: "healthy"
      additionalProperties: false

    Error:
      type: object
      required:
        - message
        - requestId
      properties:
        message:
          type: string
          description: Safe business error message for the user
          example: "Account or password is incorrect."
        requestId:
          type: string
          description: Correlation ID for troubleshooting
          example: "req_a1b2c3d4"
        fields:
          type: object
          description: Field-level validation errors (optional)
          additionalProperties:
            type: string
            example: "Email format is invalid."
      additionalProperties: false

    # --- IAM Schemas ---
    ActivationResponse:
      type: object
      required:
        - needed
      properties:
        needed:
          type: boolean
          description: Whether the system requires first-time activation
      additionalProperties: false

    ActivationRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        nickname:
          type: string
          maxLength: 100
      additionalProperties: false

    CaptchaResponse:
      type: object
      required:
        - captchaId
        - image
      properties:
        captchaId:
          type: string
          description: Captcha identifier (must be submitted with answer)
        image:
          type: string
          description: Base64-encoded PNG data URI of the captcha image
      additionalProperties: false

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - code
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        nickname:
          type: string
          maxLength: 100
        code:
          type: string
        inviteCode:
          type: string
          maxLength: 64
      additionalProperties: false

    EmailCodeRequest:
      type: object
      required:
        - email
        - captchaId
        - captchaAnswer
      properties:
        email:
          type: string
          format: email
        captchaId:
          type: string
        captchaAnswer:
          type: string
      additionalProperties: false

    LoginRequest:
      type: object
      required:
        - email
        - password
        - captchaId
        - captchaAnswer
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        captchaId:
          type: string
        captchaAnswer:
          type: string
      additionalProperties: false

    LoginResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
      additionalProperties: false

    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
      additionalProperties: false

    PasswordResetCodeRequest:
      type: object
      required:
        - email
        - captchaId
        - captchaAnswer
      properties:
        email:
          type: string
          format: email
        captchaId:
          type: string
        captchaAnswer:
          type: string
      additionalProperties: false

    PasswordResetRequest:
      type: object
      required:
        - email
        - code
        - newPassword
      properties:
        email:
          type: string
          format: email
        code:
          type: string
        newPassword:
          type: string
          minLength: 6
      additionalProperties: false

    UserResponse:
      type: object
      required:
        - id
        - email
        - nickname
        - role
        - roleLevel
        - enabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        email:
          type: string
        nickname:
          type: string
        role:
          type: string
          enum:
            - user
            - supplier
            - admin
            - super_admin
        roleLevel:
          type: integer
          description: |
            Numeric role level: 10=user, 20=supplier, 80=admin, 100=super_admin
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false

    AdminUpdateUserRequest:
      type: object
      properties:
        enabled:
          type: boolean
        roleLevel:
          type: integer
          minimum: 10
          maximum: 100
      additionalProperties: false

    PermissionCatalogResponse:
      type: object
      required:
        - permissions
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionCatalogItemResponse"
      additionalProperties: false

    PermissionCatalogItemResponse:
      type: object
      required:
        - resource
        - actions
      properties:
        resource:
          type: string
        actions:
          type: array
          items:
            type: string
      additionalProperties: false

    PermissionPolicyRequest:
      type: object
      required:
        - resource
        - action
        - effect
      properties:
        resource:
          type: string
        action:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
      additionalProperties: false

    AdminUpdateUserPermissionsRequest:
      type: object
      required:
        - policies
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PermissionPolicyRequest"
      additionalProperties: false

    UserPermissionPoliciesResponse:
      type: object
      required:
        - policies
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PermissionPolicyResponse"
      additionalProperties: false

    PermissionPolicyResponse:
      type: object
      required:
        - resource
        - action
        - effect
      properties:
        resource:
          type: string
        action:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
      additionalProperties: false

    AdminUserListResponse:
      type: object
      required:
        - users
        - total
        - offset
        - limit
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      additionalProperties: false

    AdminCreateInviteRequest:
      type: object
      required:
        - code
        - maxUse
      properties:
        code:
          type: string
          maxLength: 64
        enabled:
          type: boolean
        maxUse:
          type: integer
          minimum: 1
        expireAt:
          type: string
          format: date-time
      additionalProperties: false

    AdminUpdateInviteRequest:
      type: object
      properties:
        enabled:
          type: boolean
        maxUse:
          type: integer
          minimum: 1
        expireAt:
          type: string
          format: date-time
      additionalProperties: false

    InviteResponse:
      type: object
      required:
        - code
        - enabled
        - maxUse
        - used
        - createdAt
        - updatedAt
      properties:
        code:
          type: string
        enabled:
          type: boolean
        maxUse:
          type: integer
        used:
          type: integer
        expireAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    InviteListResponse:
      type: object
      required:
        - invites
        - total
        - offset
        - limit
      properties:
        invites:
          type: array
          items:
            $ref: "#/components/schemas/InviteResponse"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      additionalProperties: false

    SupplierApplicationRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          maxLength: 1000
      additionalProperties: false

    AdminRejectSupplierApplicationRequest:
      type: object
      required:
        - reviewReason
      properties:
        reviewReason:
          type: string
          maxLength: 500
      additionalProperties: false

    SupplierApplicationResponse:
      type: object
      required:
        - id
        - applicantUserId
        - reason
        - status
        - reviewReason
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        applicantUserId:
          type: integer
        reason:
          type: string
        status:
          type: string
          enum:
            - reviewing
            - approved
            - rejected
            - canceled
        reviewReason:
          type: string
        reviewedBy:
          type: integer
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    SupplierApplicationCurrentResponse:
      type: object
      required:
        - application
      properties:
        application:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/SupplierApplicationResponse"
      additionalProperties: false

    SupplierApplicationListResponse:
      type: object
      required:
        - applications
        - total
        - offset
        - limit
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/SupplierApplicationResponse"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      additionalProperties: false

    # --- Resource Schemas (P1-I2) ---
    ResourceListResponse:
      type: object
      required:
        - items
        - total
        - offset
        - limit
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResourceItem"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      additionalProperties: false

    ResourceItem:
      type: object
      required:
        - id
        - type
        - ownerId
        - createdAt
      properties:
        id:
          type: integer
        type:
          type: string
        ownerId:
          type: integer
        status:
          type: string
          description: Resource status (e.g., pending/normal/abnormal/disabled/deleted)
        forSale:
          type: boolean
          description: Microsoft resource is available for sale (Microsoft resources only)
        longLived:
          type: boolean
          description: Microsoft resource lifetime classification selected during import
        graphAvailable:
          type: boolean
          description: Whether Microsoft Graph mail fetch is available after validation (Microsoft resources only)
        lastSafeError:
          type: string
          description: Sanitized abnormal diagnostic summary (Microsoft resources only)
        email:
          type: string
          description: Email address (Microsoft resources only)
        domain:
          type: string
          description: Domain name (domain resources only)
        domainTld:
          type: string
          description: Backend-derived domain suffix used by exact domain bulk filters.
        mailServerId:
          type: integer
          description: Mail server id for domain resources.
        purpose:
          type: string
          enum: [not_sale, sale, binding]
          description: Domain resource purpose (domain resources only; not_sale means user-side private/unavailable for sale, binding is displayed as auxiliary mailbox in Chinese)
        mailboxCount:
          type: integer
          description: Generated mailbox count for domain resources.
        createdAt:
          type: string
          format: date-time
      additionalProperties: false

    MicrosoftResourceDetail:
      type: object
      required:
        - id
        - emailAddress
        - forSale
        - longLived
        - graphAvailable
        - status
        - qualityScore
        - createdAt
      properties:
        id:
          type: integer
        emailAddress:
          type: string
        forSale:
          type: boolean
        longLived:
          type: boolean
        graphAvailable:
          type: boolean
        status:
          type: string
        qualityScore:
          type: integer
        lastSafeError:
          type: string
        lastAllocatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      additionalProperties: false

    DomainResourceDetail:
      type: object
      required:
        - id
        - domain
        - mailServerId
        - purpose
        - status
        - createdAt
      properties:
        id:
          type: integer
        domain:
          type: string
        mailServerId:
          type: integer
        purpose:
          type: string
          enum: [not_sale, sale, binding]
          description: Domain resource purpose. not_sale is user-side private/unavailable for sale; sale is public supply; binding is displayed as auxiliary mailbox in Chinese.
        status:
          type: string
          description: Domain resource status (normal/abnormal/disabled/deleted)
        lastSafeError:
          type: string
        lastAllocatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      additionalProperties: false

    ImportResponse:
      type: object
      required:
        - importId
        - imported
      properties:
        importId:
          type: integer
        imported:
          type: integer
      additionalProperties: false

    ImportStatusResponse:
      type: object
      required:
        - importId
        - status
        - imported
        - createdAt
        - updatedAt
      properties:
        importId:
          type: integer
        status:
          type: string
          enum:
            - processing
            - imported
            - failed
        imported:
          type: integer
        lastSafeError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    ResourceValidationResponse:
      type: object
      required:
        - validationId
        - resourceId
        - resourceType
        - status
        - createdAt
        - updatedAt
      properties:
        validationId:
          type: integer
        resourceId:
          type: integer
        resourceType:
          type: string
          enum: [microsoft, domain]
        status:
          type: string
          enum:
            - queued
            - running
            - succeeded
            - failed
        lastSafeError:
          type: string
          description: Sanitized validation diagnostic. Never contains credentials, tokens, email bodies, or upstream raw details.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    PublishResourcesRequest:
      type: object
      required:
        - selection
      properties:
        selection:
          $ref: "#/components/schemas/ResourceBulkSelection"
      additionalProperties: false

    PublishResourcesResponse:
      type: object
      required:
        - requested
        - published
      properties:
        requested:
          type: integer
        published:
          type: integer
        publishedResourceIds:
          type: array
          description: Actual published resource IDs for ids mode. Omitted for filter mode to avoid large responses.
          items:
            type: integer
      additionalProperties: false

    DeleteResourcesRequest:
      type: object
      required:
        - selection
      properties:
        selection:
          $ref: "#/components/schemas/ResourceBulkSelection"
      additionalProperties: false

    ResourceBulkSelection:
      type: object
      required:
        - mode
      oneOf:
        - required:
            - mode
            - resourceIds
          properties:
            mode:
              type: string
              enum: [ids]
            resourceIds:
              type: array
              minItems: 1
              items:
                type: integer
                minimum: 1
        - required:
            - mode
            - filter
          properties:
            mode:
              type: string
              enum: [filter]
            filter:
              $ref: "#/components/schemas/ResourceBulkFilter"
      properties:
        mode:
          type: string
          enum: [ids, filter]
          description: ids selects explicit checked resources; filter selects all private resources matching the server-side filters.
        resourceIds:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
          description: Required when mode is ids.
        filter:
          $ref: "#/components/schemas/ResourceBulkFilter"
      additionalProperties: false

    ResourceBulkFilter:
      type: object
      required:
        - resourceType
      properties:
        resourceType:
          type: string
          enum: [microsoft, domain]
        search:
          type: string
          description: Unified fuzzy search. Microsoft matches email and suffix; domain matches domain and TLD.
        suffix:
          type: string
          description: Exact Microsoft suffix such as @outlook.com.
        tld:
          type: string
          description: Exact domain suffix such as .com.
        status:
          type: string
        longLived:
          type: boolean
          description: Microsoft long-lived filter.
        graphAvailable:
          type: boolean
          description: Microsoft Graph availability filter.
        createdFrom:
          type: string
          format: date-time
          description: Inclusive resource creation lower bound. The frontend must send ISO date-time.
        createdTo:
          type: string
          format: date-time
          description: Inclusive resource creation upper bound. The frontend must send ISO date-time.
      additionalProperties: false

    DeleteResourcesResponse:
      type: object
      required:
        - requested
        - deleted
      properties:
        requested:
          type: integer
        deleted:
          type: integer
        deletedResourceIds:
          type: array
          description: Actual deleted resource IDs for ids mode. Omitted for filter mode to avoid large responses.
          items:
            type: integer
      additionalProperties: false

    DeleteProxiesRequest:
      type: object
      oneOf:
        - required:
            - proxyIds
          properties:
            all:
              type: boolean
              enum: [false]
            proxyIds:
              type: array
              minItems: 1
              items:
                type: integer
                minimum: 1
        - required:
            - all
            - filter
          properties:
            all:
              type: boolean
              enum: [true]
            filter:
              $ref: "#/components/schemas/ProxyBulkFilter"
          not:
            required:
              - proxyIds
      properties:
        all:
          type: boolean
          description: Delete every proxy matching filter. When false or omitted, proxyIds mode is used.
        filter:
          $ref: "#/components/schemas/ProxyBulkFilter"
        proxyIds:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
      additionalProperties: false

    ProxyBulkFilter:
      type: object
      properties:
        pool:
          type: string
          enum: [resource, system]
        ip:
          type: string
          enum: [auto, ipv4, ipv6]
        ipv6:
          type: boolean
        status:
          type: string
          enum: [checking, normal, abnormal, disabled, expired]
        country:
          type: string
        search:
          type: string
        createdFrom:
          type: string
          format: date-time
        createdTo:
          type: string
          format: date-time
      additionalProperties: false

    DeleteProxiesResponse:
      type: object
      required:
        - requested
        - deleted
      properties:
        requested:
          type: integer
        deleted:
          type: integer
        deletedProxyIds:
          type: array
          items:
            type: integer
        deletedByFilter:
          type: boolean
      additionalProperties: false

    DisableProxiesRequest:
      type: object
      required:
        - all
        - filter
      properties:
        all:
          type: boolean
          enum: [true]
          description: Disable every proxy matching filter. This endpoint only supports filter mode.
        filter:
          $ref: "#/components/schemas/ProxyBulkFilter"
      additionalProperties: false

    DisableProxiesResponse:
      type: object
      required:
        - requested
        - disabled
      properties:
        requested:
          type: integer
        disabled:
          type: integer
        disabledByFilter:
          type: boolean
      additionalProperties: false

    CheckProxiesRequest:
      type: object
      oneOf:
        - required:
            - proxyIds
          properties:
            all:
              type: boolean
              enum: [false]
            proxyIds:
              type: array
              minItems: 1
              items:
                type: integer
                minimum: 1
        - required:
            - all
            - filter
          properties:
            all:
              type: boolean
              enum: [true]
            filter:
              $ref: "#/components/schemas/ProxyBulkFilter"
          not:
            required:
              - proxyIds
      properties:
        all:
          type: boolean
          description: Check every proxy matching filter. When false or omitted, proxyIds mode is used.
        filter:
          $ref: "#/components/schemas/ProxyBulkFilter"
        proxyIds:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
      additionalProperties: false

    CheckProxiesResponse:
      type: object
      required:
        - requested
        - queued
        - checked
        - failed
        - items
      properties:
        requested:
          type: integer
        queued:
          type: integer
          description: Number of proxy checks accepted as durable check jobs. Filter mode creates one durable batch scheduler job while this value still reports the matched proxy count.
        checked:
          type: integer
          description: Reserved for completed synchronous checks. Always 0 for asynchronous check submission.
        failed:
          type: integer
          description: Reserved for completed synchronous checks. Always 0 for asynchronous check submission.
        items:
          type: array
          description: Queued proxy snapshots. Empty for fully asynchronous batch submissions.
          items:
            $ref: "#/components/schemas/ProxyItem"
      additionalProperties: false

    ImportProxiesRequest:
      type: object
      required:
        - pool
        - urls
      properties:
        pool:
          type: string
          enum: [resource, system]
        urls:
          type: array
          minItems: 1
          items:
            type: string
            description: Original proxy URL. Must include an explicit port and supports http, https, socks5 and socks5h.
        expireAt:
          type: string
          format: date-time
          nullable: true
          description: Optional proxy expiration time. null or omitted means no expiration.
      additionalProperties: false

    ImportProxiesResponse:
      type: object
      required:
        - requested
        - created
        - duplicated
        - items
      properties:
        requested:
          type: integer
        created:
          type: integer
        duplicated:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProxyItem"
      additionalProperties: false

    ProxyCount:
      type: object
      required:
        - key
        - count
      properties:
        key:
          type: string
        count:
          type: integer
      additionalProperties: false

    ProxyStatsResponse:
      type: object
      required:
        - total
        - countries
        - statuses
        - pools
        - ipVersions
      properties:
        total:
          type: integer
        countries:
          type: array
          items:
            $ref: "#/components/schemas/ProxyCount"
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/ProxyCount"
        pools:
          type: array
          items:
            $ref: "#/components/schemas/ProxyCount"
        ipVersions:
          type: array
          items:
            $ref: "#/components/schemas/ProxyCount"
      additionalProperties: false

    ProxyListResponse:
      type: object
      required:
        - items
        - total
        - offset
        - limit
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProxyItem"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      additionalProperties: false

    ProxyBindingListResponse:
      type: object
      required:
        - items
        - total
        - offset
        - limit
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProxyBindingItem"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      additionalProperties: false

    ProxyBindingItem:
      type: object
      required:
        - id
        - key
        - proxyId
        - ipVersion
        - expireAt
        - createdAt
      properties:
        id:
          type: integer
        key:
          type: string
        proxyId:
          type: integer
        ipVersion:
          type: string
          enum: [ipv4, ipv6]
        expireAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false

    ProxyItem:
      type: object
      required:
        - id
        - pool
        - url
        - expireAt
        - ipVersion
        - outboundIp
        - country
        - latencyMs
        - status
        - errors
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        pool:
          type: string
          enum: [resource, system]
        url:
          type: string
          description: Complete proxy URL for authorized admin endpoints. Logs, errors and diagnostics remain redacted.
        expireAt:
          type: string
          format: date-time
          nullable: true
          description: null means no expiration.
        ipVersion:
          type: string
          description: Detected proxy outbound IP version. Empty before the first successful check.
        outboundIp:
          type: string
        country:
          type: string
        latencyMs:
          type: integer
        status:
          type: string
          enum: [checking, normal, abnormal, disabled, expired]
        errors:
          type: integer
        lastSafeError:
          type: string
        lastCheckedAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    CreateProxyRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Original proxy URL. Must include an explicit port and supports http, https, socks5 and socks5h.
        expireAt:
          type: string
          format: date-time
          nullable: true
          description: Optional proxy expiration time. null or omitted means no expiration.
      additionalProperties: false

    UpdateProxyRequest:
      type: object
      properties:
        url:
          type: string
          description: Updated proxy URL. Must include an explicit port and supports http, https, socks5 and socks5h. Changing URL resets detected fields and queues an async check.
        status:
          type: string
          enum: [checking, disabled]
          description: Admin can disable a proxy or move it back to checking for recheck. normal is system-detected only.
        expireAt:
          type: string
          format: date-time
          nullable: true
          description: Optional proxy expiration time. Send null to clear expiration.
      additionalProperties: false

