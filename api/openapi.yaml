          description: Resource status does not allow validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/resources/validations:
    post:
      operationId: postResourceValidations
      summary: Queue asynchronous resource validations in batch
      tags:
        - Resources
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      description: >
        Enqueues the selection as an ephemeral Redis/Asynq cursor and returns
        immediately. The worker expands Microsoft and Domain selections one
        bounded page at a time and changes matching resources to pending. The
        dispatcher then changes only a capacity-bounded set to validating and
        enqueues their Redis tasks. Completed page and resource tasks are removed
        immediately; no validation batch or job history is stored in MySQL or
        retained in Redis. This endpoint is the batch counterpart of POST
        /v1/resources/{resourceId}/validate and avoids client-side request loops.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateResourcesRequest"
      responses:
        "202":
          description: Resource validations queued
