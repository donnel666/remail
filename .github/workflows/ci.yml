name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  backend-static:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: go mod download

      - name: Check Go formatting
        run: |
          UNFORMATTED=$(gofmt -l api cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Verify OpenAPI generated code
        run: |
          go generate ./api
          git diff --exit-code -- api/openapi.gen.go

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  backend-test-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: core
            packages: ./internal/core/... ./internal/iam/... ./internal/mailtransport/...
          - shard: services
            packages: ./api/... ./cmd/benchseed/... ./cmd/msrecovery/... ./internal/alloc/... ./internal/billing/... ./internal/governance/... ./internal/mailmatch/... ./internal/openapi/... ./internal/platform/... ./internal/proxy/... ./internal/trade/...

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run ${{ matrix.shard }} tests
        run: go test -p 1 -parallel 1 ${{ matrix.packages }} -count=1 -timeout=15m

  backend-test:
    if: always()
    needs: [backend-test-shard]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all backend test shards
        run: test "${{ needs.backend-test-shard.result }}" = "success"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify OpenAPI TypeScript schema
        run: |
          pnpm generate:api
          git diff --exit-code -- src/lib/openapi/schema.ts

      - name: Verify public OpenAPI schema
        run: |
          pnpm generate:public-openapi
          git diff --exit-code -- public/openapi.json

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  smoke:
    if: github.event_name != 'pull_request'
    needs: [backend-static, backend-test, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: remail
          MYSQL_USER: remail
          MYSQL_PASSWORD: remail
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: cmd/server/webdist

      - name: Start MinIO
        run: |
          docker rm -f remail-smoke-minio >/dev/null 2>&1 || true
          docker run -d \
            --name remail-smoke-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=remail \
            -e MINIO_ROOT_PASSWORD=remail_secret \
            minio/minio:latest server /data --console-address ":9001"
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            if ! docker ps --format '{{.Names}}' | grep -qx remail-smoke-minio; then
              docker logs remail-smoke-minio
              exit 1
            fi
            sleep 1
          done
          docker logs remail-smoke-minio
          exit 1

      - name: Build server binary
        run: go build -o /tmp/remail-server ./cmd/server

      - name: Start server in background
        run: |
          /tmp/remail-server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz >/dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          exit 1
        env:
          MYSQL_DSN: "remail:remail@tcp(127.0.0.1:3306)/remail?charset=utf8mb4&parseTime=True&loc=Local"
          REDIS_ADDR: "127.0.0.1:6379"
          MINIO_ENDPOINT: "127.0.0.1:9000"
          MINIO_ACCESS_KEY: "remail"
          MINIO_SECRET_KEY: "remail_secret"
          MINIO_USE_SSL: "false"
          MINIO_BUCKET: "remail"
          SESSION_SECRET: "ci-smoke-secret"
          LOG_LEVEL: "error"

      - name: Verify /healthz returns 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          BODY=$(curl -sf http://localhost:8080/healthz)
          echo "GET /healthz -> $HTTP_CODE $BODY"
          test "$HTTP_CODE" = "200"
          echo "$BODY" | grep -q '"ok"'

      - name: Verify /readyz returns 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/readyz)
          BODY=$(curl -sf http://localhost:8080/readyz)
          echo "GET /readyz -> $HTTP_CODE $BODY"
          test "$HTTP_CODE" = "200"
          echo "$BODY" | grep -q '"ok"'

      - name: Verify migrations and critical tables
        run: |
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT 1 FROM mailmatch_order_delivery_heads LIMIT 1;"
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT 1 FROM microsoft_resource_project_matches LIMIT 1;"
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT blocked_resource_signature, blocked_resource_updated_at, blocked_last_allocated_at FROM microsoft_alias_schedules LIMIT 1;"
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT was_attempted, uncertain_since, negative_confirmations, last_negative_confirmation_at FROM microsoft_alias_attempts LIMIT 1;"
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT owner_user_id FROM explicit_aliases LIMIT 1;"
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT claim_token, dispatch_token, dispatched_at FROM resource_validation_jobs LIMIT 1;"
          mysql -h 127.0.0.1 -u remail -premail remail -e \
            "SELECT owner_user_id FROM explicit_aliases LIMIT 1;"

      - name: Shutdown server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

  docker:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [backend-static, backend-test, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: false
          tags: remail:ci
          cache-from: type=gha,scope=remail-docker
          cache-to: type=gha,mode=min,scope=remail-docker

  image:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: image
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "$GITHUB_REF" = "refs/heads/main" ]; then
              echo "${IMAGE_NAME}:main"
            elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=remail-docker
          cache-to: type=gha,mode=min,scope=remail-docker

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [image]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: cmd/server/webdist

      - name: Build release artifact
        run: |
          mkdir -p dist/remail
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/remail/remail-server ./cmd/server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/remail/remail-msrecovery ./cmd/msrecovery
          cp -r migrations dist/remail/migrations
          cp deploy/compose.yml deploy/nginx.conf dist/remail/
          tar -czf "dist/remail-${GITHUB_REF_NAME}-linux-amd64.tar.gz" -C dist remail

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          artifact="dist/remail-${TAG_NAME}-linux-amd64.tar.gz"
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$artifact" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [image]
    runs-on: [self-hosted, linux, x64, remail-test]
    timeout-minutes: 15
    concurrency:
      group: remail-test-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment files
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SMTP_DKIM_PRIVATE_KEY: ${{ secrets.SMTP_DKIM_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p /opt/remail/certs /opt/remail/secrets
          cp deploy/compose.yml deploy/nginx.conf /opt/remail/
          if [ -z "$SMTP_DKIM_PRIVATE_KEY" ]; then
            echo "SMTP_DKIM_PRIVATE_KEY GitHub secret is required" >&2
            exit 1
          fi
          printf '%s\n' "$SMTP_DKIM_PRIVATE_KEY" > /opt/remail/secrets/smtp-dkim-private-key.pem
          chmod 600 /opt/remail/secrets/smtp-dkim-private-key.pem
          cat > /opt/remail/.env <<EOF
          APP_IMAGE=${APP_IMAGE}
          DEPLOY_DOMAIN=${DEPLOY_DOMAIN}
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=remail
          MYSQL_USER=remail
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          MYSQL_DSN=remail:${MYSQL_PASSWORD}@tcp(mysql:3306)/remail?charset=utf8mb4&parseTime=True&loc=Local
          REDIS_PASSWORD=${REDIS_PASSWORD}
          MINIO_ROOT_USER=${MINIO_ROOT_USER}
          MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
          MINIO_BUCKET=remail
          SESSION_SECRET=${SESSION_SECRET}
          SESSION_SECURE=true
          SMTP_MODE=direct
          SMTP_ADDR=
          SMTP_USERNAME=
          SMTP_PASSWORD=
          SMTP_FROM=no-reply@aishop6.com
          SMTP_DOMAIN=aishop6.com
          SMTP_HELO_DOMAIN=mx.aishop6.com
          SMTP_DKIM_ENABLED=true
          SMTP_DKIM_DOMAIN=aishop6.com
          SMTP_DKIM_SELECTOR=mx
          SMTP_DKIM_ALGORITHM=ed25519-sha256
          SMTP_DKIM_IDENTITY=@aishop6.com
          SMTP_DKIM_PRIVATE_KEY_FILE=/run/secrets/smtp-dkim-private-key.pem
          SMTP_INBOUND_ENABLED=true
          SMTP_INBOUND_ADDR=:2525
          SMTP_INBOUND_DOMAIN=mx.aishop6.com
          SMTP_INBOUND_MAX_MESSAGE_BYTES=10485760
          PPROF_ADDR=127.0.0.1:6060
          EOF
          sed -i 's/^          //' /opt/remail/.env
          chmod 600 /opt/remail/.env

      - name: Ensure origin certificate
        run: |
          set -euo pipefail
          cd /opt/remail
          DOMAIN="$(awk -F= '$1 == "DEPLOY_DOMAIN" {print $2}' .env)"
          if [ -z "$DOMAIN" ]; then
            echo "DEPLOY_DOMAIN is required" >&2
            exit 1
          fi
          if [ ! -s "certs/${DOMAIN}.crt" ] || [ ! -s "certs/${DOMAIN}.key" ]; then
            openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
              -keyout "certs/${DOMAIN}.key" \
              -out "certs/${DOMAIN}.crt" \
              -subj "/CN=${DOMAIN}" \
              -addext "subjectAltName=DNS:${DOMAIN}"
          fi

      - name: Deploy compose stack
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd /opt/remail
          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is required on the deploy host" >&2
            exit 1
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose plugin is required on the deploy host" >&2
            exit 1
          fi
          if ! command -v openssl >/dev/null 2>&1; then
            echo "openssl is required on the deploy host" >&2
            exit 1
          fi

          wait_for_health() {
            for _ in $(seq 1 60); do
              if docker compose --env-file .env -f compose.yml exec -T server wget -qO- http://127.0.0.1:8080/readyz | grep -q '"ok"'; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          set_app_image() {
            image="$1"
            tmp="$(mktemp)"
            awk -v image="$image" '
              BEGIN { written = 0 }
              /^APP_IMAGE=/ { print "APP_IMAGE=" image; written = 1; next }
              { print }
              END { if (written == 0) print "APP_IMAGE=" image }
            ' .env > "$tmp"
            mv "$tmp" .env
            chmod 600 .env
          }

          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null

          CURRENT_IMAGE="$(awk -F= '$1 == "APP_IMAGE" {print $2}' .env)"
          PREVIOUS_IMAGE="$(docker compose --env-file .env -f compose.yml ps -q server | xargs -r docker inspect --format '{{.Config.Image}}' | head -n1 || true)"
          echo "Current target image: ${CURRENT_IMAGE}"
          echo "Previous server image: ${PREVIOUS_IMAGE:-none}"

          deploy_status=0
          docker compose --env-file .env -f compose.yml pull server || deploy_status=$?
          if [ "$deploy_status" -eq 0 ]; then
            docker compose --env-file .env -f compose.yml up -d --remove-orphans || deploy_status=$?
          fi

          if [ "$deploy_status" -eq 0 ] && wait_for_health; then
            docker compose --env-file .env -f compose.yml ps
            docker logout ghcr.io >/dev/null 2>&1 || true
            docker image prune -f >/dev/null 2>&1 || true
            exit 0
          fi

          echo "New deployment failed; collecting logs before rollback" >&2
          docker compose --env-file .env -f compose.yml logs --tail=200 server nginx || true
          if [ -n "$PREVIOUS_IMAGE" ] && [ "$PREVIOUS_IMAGE" != "$CURRENT_IMAGE" ]; then
            echo "Rolling back to previous image: $PREVIOUS_IMAGE" >&2
            set_app_image "$PREVIOUS_IMAGE"
            docker compose --env-file .env -f compose.yml pull server || \
              echo "Previous image is unavailable remotely; trying the local image cache" >&2
            rollback_status=0
            docker compose --env-file .env -f compose.yml up -d --remove-orphans || rollback_status=$?
            if [ "$rollback_status" -eq 0 ] && wait_for_health; then
              echo "Rollback completed; previous image is healthy" >&2
              docker compose --env-file .env -f compose.yml ps
            else
              echo "Rollback failed to start or pass health check" >&2
              docker compose --env-file .env -f compose.yml logs --tail=200 server nginx || true
            fi
          else
            echo "No previous image available for rollback" >&2
          fi
          docker logout ghcr.io >/dev/null 2>&1 || true
          exit 1
